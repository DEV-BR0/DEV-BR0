name: Isometric Commit Calendar
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Full Animated Metrics Dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics.isocalendar.svg
          base: ""
          config_timezone: Asia/Tashkent

          # Isometric 3D animated commit calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Animated activity graph (recent commits, PRs, issues, reviews)
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_visibility: all

          # Animated language breakdown (donut chart)
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_details: percentage
          plugin_languages_analysis_timeout: 15

          # Animated achievement badges
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_threshold: C

          # Animated introduction line (typing effect)
          plugin_introduction: yes
